<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Votación</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <p class="residential-name">EDIFICIO AL LADO DEL CENTRO</p>
        </div>
        <h1 class="welcome-text">¡Bienvenido!</h1>
        
        <div id="section-vote" class="card-body">
            <h1 class="welcome-text">Votación en Curso</h1>
            <p class="instruction">Selecciona una opción para registrar tu decisión.</p>

            <div class="vote-options" id="vote-options-container"></div>

            <button class="verify-btn" id="submit-vote-btn">Enviar Voto</button>
        </div>
        <div id="section-success" class="card-body hidden">
            <div class="success-icon-container">
                <svg class="ft-tick" xmlns="http://www.w3.org/2000/svg" height="80" width="80" viewBox="0 0 48 48">
                    <circle class="circle" fill="#705192" cx="24" cy="24" r="22" />
                    <path class="tick" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round"
                        stroke-linejoin="round" d="M12 24l8 8 16-16" />
                </svg>
            </div>
            <h1 class="welcome-text">¡Voto Registrado!</h1>
            <p class="instruction">Gracias por su participación. Voto registrado correctamente.</p>
            <button class="verify-btn btn-secondary" id="back">Volver</button>
        </div>
        <div class="card-footer">
            <span class="alert-message"></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
