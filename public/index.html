<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Asamblea</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <p class="residential-name">CONJUNTO RESIDENCIAL CAMPO REAL</p>
        </div>
        <div class="card-body">
            <div>
                <h1 class="welcome-text">¡Bienvenido!</h1>
                <div class="icon-circle">
                    <svg width="50" height="40" viewBox="0 0 512 512" fill="white">
                        <path
                            d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zm-47.2 114.2l-184 184c-6.2 6.2-16.4 6.2-22.6 0l-104-104c-6.2-6.2-6.2-16.4 0-22.6l22.6-22.6c6.2-6.2 16.4-6.2 22.6 0l70.1 70.1 150.1-150.1c6.2-6.2 16.4-6.2 22.6 0l22.6 22.6c6.3 6.3 6.3 16.4 0 22.6z" />
                    </svg>
                </div>
                <p class="instruction">Ingresa el código de 6 dígitos para acceder a la asamblea.</p>
            </div>

            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
            </div>

            <button class="verify-btn">Verificar Acceso</button>
        </div>
        <div class="card-footer">
            <span class="alert-message"></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
